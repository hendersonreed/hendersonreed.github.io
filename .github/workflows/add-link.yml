name: Add Link to Linkblog

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL'
        required: true
      title:
        description: 'Title'
        required: true
      commentary:
        description: 'Commentary (optional)'
        required: false
        default: ''

jobs:
  add-link:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Add link
        env:
          LINK_URL: ${{ github.event.inputs.url }}
          LINK_TITLE: ${{ github.event.inputs.title }}
          LINK_COMMENTARY: ${{ github.event.inputs.commentary }}
        run: |
          python3 tools/add-link.py \
            --url "$LINK_URL" \
            --title "$LINK_TITLE" \
            --commentary "$LINK_COMMENTARY"

      - name: Commit and push
        env:
          LINK_TITLE: ${{ github.event.inputs.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/links/links.json
          git commit -m "linkblog: add $LINK_TITLE"
          git push
